<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تقديم على وظيفة - {{ job.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .apply-card { background: white; border-radius: 25px; padding: 35px; max-width: 600px; margin: 50px auto; }
        .btn-apply { background: #27ae60; color: white; padding: 12px; border-radius: 50px; }
    </style>
</head>
<body class="bg-light">
<div class="container">
    <div class="apply-card">
        <div class="text-center mb-4">
            <i class="fas fa-paper-plane fa-3x text-primary"></i>
            <h3>تقديم على وظيفة: {{ job.title }}</h3>
            <p>{{ job.employer.company_name }} - {{ job.location }}</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3"><label>رسالة تعريفية</label>{{ form.cover_letter }}</div>
            <div class="mb-3"><label>الراتب المتوقع (ريال)</label>{{ form.expected_salary }}</div>
            <button type="submit" class="btn btn-apply w-100">إرسال الطلب</button>
        </form>
    </div>
</div>
</body>
</html>
